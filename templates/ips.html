{% extends "base.html" %}
{% set page = 'ips' %}
{% block page_title %}知识产权库{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <div class="p-5 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <select id="filter-type" onchange="loadIPs(1)" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                <option value="">全部类型</option>
                <option value="patent">专利</option>
                <option value="trademark">商标</option>
                <option value="copyright">著作权</option>
            </select>
            <select id="filter-status" onchange="loadIPs(1)" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                <option value="">全部状态</option>
                <option value="active">有效</option>
                <option value="expired">已过期</option>
                <option value="pending">申请中</option>
            </select>
            <input type="text" id="filter-keyword" placeholder="搜索名称/编号"
                class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary w-64">
            <button onclick="loadIPs(1)" class="px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-primary/90 transition">
                <i class="fa fa-search mr-1"></i>查询
            </button>
        </div>
        <button onclick="showAddModal()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-primary/90 transition">
            <i class="fa fa-plus mr-1"></i>添加知识产权
        </button>
    </div>

    <div class="p-5">
        <span id="ips-count" class="text-sm text-gray-500 mb-4 block">共 0 条记录</span>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-gray-200 bg-gray-50">
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">类型</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">知识产权号</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">名称</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">权利人</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">分类</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">状态</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">申请日期</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">到期日期</th>
                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">操作</th>
                    </tr>
                </thead>
                <tbody id="ips-table">
                    <tr><td colspan="9" class="text-center py-16 text-gray-400"><span class="loading"></span> 加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="pagination" class="flex items-center justify-end mt-6 space-x-1">
        </div>
    </div>
</div>

<!-- 添加弹窗 -->
<div id="add-modal" class="fixed inset-0 z-50 hidden">
    <div class="modal-backdrop absolute inset-0" onclick="closeAddModal()"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg shadow-xl p-6 w-[600px] max-h-[90vh] overflow-y-auto">
        <h3 class="text-lg font-semibold mb-5">添加知识产权</h3>
        <form id="add-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">类型 *</label>
                    <select id="form-type" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                        <option value="patent">专利</option>
                        <option value="trademark">商标</option>
                        <option value="copyright">著作权</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">知识产权号 *</label>
                    <input type="text" id="form-number" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">名称 *</label>
                <input type="text" id="form-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">权利人 *</label>
                <input type="text" id="form-owner" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                    <input type="text" id="form-category" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                    <select id="form-status" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                        <option value="active">有效</option>
                        <option value="expired">已过期</option>
                        <option value="pending">申请中</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">申请日期</label>
                    <input type="date" id="form-apply-date" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">授权日期</label>
                    <input type="date" id="form-grant-date" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">关键词（逗号分隔）</label>
                <input type="text" id="form-keywords" placeholder="关键词1,关键词2,关键词3" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                <textarea id="form-desc" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary"></textarea>
            </div>
            <div class="flex justify-end space-x-3 pt-4">
                <button type="button" onclick="closeAddModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50 transition">取消</button>
                <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;

    function showAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
    function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

    async function loadIPs(page = 1) {
        currentPage = page;
        const type = document.getElementById('filter-type').value;
        const status = document.getElementById('filter-status').value;
        const keyword = document.getElementById('filter-keyword').value;
        const pageSize = 20;

        let url = `/ips?page=${page}&page_size=${pageSize}`;
        if (type) url += `&ip_type=${type}`;
        if (status) url += `&status=${status}`;
        if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

        const res = await apiRequest(url);
        const tbody = document.getElementById('ips-table');

        if (res && res.items) {
            document.getElementById('ips-count').textContent = `共 ${res.total} 条记录`;
            totalPages = Math.ceil(res.total / pageSize);

            const typeMap = { patent: '专利', trademark: '商标', copyright: '著作权' };
            const statusMap = { active: '有效', expired: '已过期', pending: '申请中' };
            const statusClass = { active: 'badge-success', expired: 'badge-info', pending: 'badge-medium' };

            if (res.items.length > 0) {
                tbody.innerHTML = res.items.map(ip => `
                    <tr class="table-row border-b border-gray-100">
                        <td class="py-3 px-4 text-sm">${typeMap[ip.ip_type] || ip.ip_type}</td>
                        <td class="py-3 px-4 text-sm font-mono text-primary">${ip.ip_number}</td>
                        <td class="py-3 px-4 text-sm">${ip.name}</td>
                        <td class="py-3 px-4 text-sm">${ip.owner}</td>
                        <td class="py-3 px-4 text-sm">${ip.category || '-'}</td>
                        <td class="py-3 px-4 text-sm"><span class="badge ${statusClass[ip.status] || 'badge-info'}">${statusMap[ip.status] || ip.status}</span></td>
                        <td class="py-3 px-4 text-sm text-gray-500">${ip.application_date || '-'}</td>
                        <td class="py-3 px-4 text-sm text-gray-500">${ip.expiration_date || '-'}</td>
                        <td class="py-3 px-4 text-sm space-x-2">
                            <a href="javascript:void(0)" onclick="deleteIP(${ip.id})" class="text-danger hover:text-danger/80">删除</a>
                        </td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center py-16 text-gray-400">暂无数据</td></tr>';
            }
            renderPagination();
        }
    }

    function renderPagination() {
        const container = document.getElementById('pagination');
        let html = '';
        html += `<button onclick="loadIPs(${Math.max(1, currentPage - 1)})" class="px-3 py-1 border rounded text-sm ${currentPage <= 1 ? 'text-gray-400 cursor-not-allowed' : 'hover:bg-gray-50'}" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
        for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
            html += `<button onclick="loadIPs(${i})" class="px-3 py-1 border rounded text-sm ${i === currentPage ? 'bg-primary text-white border-primary' : 'hover:bg-gray-50'}">${i}</button>`;
        }
        html += `<button onclick="loadIPs(${Math.min(totalPages, currentPage + 1)})" class="px-3 py-1 border rounded text-sm ${currentPage >= totalPages ? 'text-gray-400 cursor-not-allowed' : 'hover:bg-gray-50'}" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
        container.innerHTML = html;
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            ip_type: document.getElementById('form-type').value,
            ip_number: document.getElementById('form-number').value,
            name: document.getElementById('form-name').value,
            owner: document.getElementById('form-owner').value,
            category: document.getElementById('form-category').value || undefined,
            status: document.getElementById('form-status').value,
            application_date: document.getElementById('form-apply-date').value || undefined,
            grant_date: document.getElementById('form-grant-date').value || undefined,
            description: document.getElementById('form-desc').value || undefined,
            keywords: document.getElementById('form-keywords').value ? document.getElementById('form-keywords').value.split(',').map(k => k.trim()) : undefined
        };
        const res = await apiRequest('/ips', { method: 'POST', body: JSON.stringify(data) });
        if (res && res.success) {
            showToast('添加成功');
            closeAddModal();
            loadIPs(1);
        } else {
            showToast(res.message || '添加失败', 'error');
        }
    });

    async function deleteIP(id) {
        showConfirm('确定要删除该知识产权吗？', async () => {
            const res = await apiRequest(`/ips/${id}`, { method: 'DELETE' });
            if (res && res.success) {
                showToast('删除成功');
                loadIPs(currentPage);
            } else {
                showToast(res.message || '删除失败', 'error');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await checkAuth();
        await loadIPs(1);
    });
</script>
{% endblock %}
