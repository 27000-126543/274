<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}知识产权侵权监测与维权管理系统{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        info: '#86909C'
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .sidebar-link.active { background: rgba(22, 93, 255, 0.1); color: #165DFF; border-right: 3px solid #165DFF; }
        .sidebar-link:hover { background: rgba(22, 93, 255, 0.05); }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-low { background: #E8FFEA; color: #00B42A; }
        .badge-medium { background: #FFF3E8; color: #FF7D00; }
        .badge-high { background: #FFECE8; color: #F53F3F; }
        .table-row:hover { background: #F7F8FA; }
        .modal-backdrop { background: rgba(0, 0, 0, 0.5); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #165DFF; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {% if not is_login_page %}
    <div class="flex min-h-screen">
        <!-- 侧边栏 -->
        <aside class="w-60 bg-white border-r border-gray-200 flex-shrink-0">
            <div class="h-16 flex items-center px-5 border-b border-gray-200">
                <i class="fa fa-shield text-primary text-2xl mr-3"></i>
                <span class="font-bold text-lg text-gray-800">IP维权系统</span>
            </div>
            <nav class="py-4">
                <a href="/" class="sidebar-link flex items-center px-5 py-3 text-gray-600 transition {% if page == 'dashboard' %}active{% endif %}">
                    <i class="fa fa-dashboard w-5 mr-3"></i>
                    <span>数据概览</span>
                </a>
                <a href="/cases" class="sidebar-link flex items-center px-5 py-3 text-gray-600 transition {% if page == 'cases' %}active{% endif %}">
                    <i class="fa fa-gavel w-5 mr-3"></i>
                    <span>侵权案件</span>
                </a>
                <a href="/ips" class="sidebar-link flex items-center px-5 py-3 text-gray-600 transition {% if page == 'ips' %}active{% endif %}">
                    <i class="fa fa-copyright w-5 mr-3"></i>
                    <span>知识产权库</span>
                </a>
                <a href="/clues" class="sidebar-link flex items-center px-5 py-3 text-gray-600 transition {% if page == 'clues' %}active{% endif %}">
                    <i class="fa fa-lightbulb-o w-5 mr-3"></i>
                    <span>线下线索</span>
                </a>
                <a href="/reports" class="sidebar-link flex items-center px-5 py-3 text-gray-600 transition {% if page == 'reports' %}active{% endif %}">
                    <i class="fa fa-bar-chart w-5 mr-3"></i>
                    <span>报告中心</span>
                </a>
                <a href="/logs" class="sidebar-link flex items-center px-5 py-3 text-gray-600 transition {% if page == 'logs' %}active{% endif %}">
                    <i class="fa fa-history w-5 mr-3"></i>
                    <span>操作日志</span>
                </a>
                <div class="border-t border-gray-100 my-4 mx-4"></div>
                <div class="px-5 py-2">
                    <p class="text-xs text-gray-400 mb-3">快捷操作</p>
                    <button onclick="startCrawl()" class="w-full bg-primary text-white py-2 px-4 rounded hover:bg-primary/90 transition text-sm">
                        <i class="fa fa-spider mr-2"></i>启动爬取
                    </button>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 flex flex-col">
            <!-- 顶部栏 -->
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
                <h1 class="text-lg font-semibold text-gray-800">{% block page_title %}数据概览{% endblock %}</h1>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">欢迎, <span id="current-user" class="font-medium text-gray-700">管理员</span></span>
                    <button onclick="logout()" class="text-gray-500 hover:text-danger transition">
                        <i class="fa fa-sign-out mr-1"></i>退出
                    </button>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="flex-1 p-6 overflow-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% else %}
        {% block login_content %}{% endblock %}
    {% endif %}

    <!-- 通知提示 -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg border px-4 py-3 flex items-center">
            <i id="toast-icon" class="fa fa-check-circle text-success mr-3 text-xl"></i>
            <span id="toast-message" class="text-gray-700">操作成功</span>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div id="confirm-modal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeConfirm()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg shadow-xl p-6 w-96">
            <h3 class="text-lg font-semibold mb-3">确认操作</h3>
            <p id="confirm-message" class="text-gray-600 mb-6">确定要执行此操作吗？</p>
            <div class="flex justify-end space-x-3">
                <button onclick="closeConfirm()" class="px-4 py-2 border rounded hover:bg-gray-50 transition">取消</button>
                <button id="confirm-btn" class="px-4 py-2 bg-primary text-white rounded hover:bg-primary/90 transition">确定</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('auth_token');

        async function apiRequest(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }

            const response = await fetch(API_BASE + url, {
                ...options,
                headers
            });

            if (response.status === 401) {
                localStorage.removeItem('auth_token');
                window.location.href = '/login';
                return;
            }

            return response.json();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');

            msg.textContent = message;
            icon.className = type === 'success' ? 'fa fa-check-circle text-success mr-3 text-xl' :
                              type === 'error' ? 'fa fa-times-circle text-danger mr-3 text-xl' :
                              'fa fa-info-circle text-primary mr-3 text-xl';

            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        let confirmCallback = null;
        function showConfirm(message, callback) {
            document.getElementById('confirm-message').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function closeConfirm() {
            document.getElementById('confirm-modal').classList.add('hidden');
            confirmCallback = null;
        }

        document.getElementById('confirm-btn')?.addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            closeConfirm();
        });

        async function logout() {
            showConfirm('确定要退出登录吗？', async () => {
                localStorage.removeItem('auth_token');
                window.location.href = '/login';
            });
        }

        async function startCrawl() {
            showConfirm('确定要启动全网爬取任务吗？这可能需要较长时间。', async () => {
                showToast('爬取任务已在后台启动', 'info');
                await apiRequest('/system/crawl/start', { method: 'POST' });
                setTimeout(() => {
                    showToast('爬取任务正在执行中，请稍后刷新查看结果', 'success');
                }, 2000);
            });
        }

        async function checkAuth() {
            if (!authToken && !window.location.pathname.includes('login')) {
                window.location.href = '/login';
                return false;
            }
            if (authToken) {
                try {
                    const res = await apiRequest('/auth/me');
                    if (res && res.data) {
                        document.getElementById('current-user').textContent = res.data.username;
                    }
                } catch (e) {
                    localStorage.removeItem('auth_token');
                    window.location.href = '/login';
                }
            }
            return true;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function getRiskBadge(level) {
            const map = {
                'low': { class: 'badge-low', text: '低风险' },
                'medium': { class: 'badge-medium', text: '中风险' },
                'high': { class: 'badge-high', text: '高风险' }
            };
            const info = map[level] || { class: 'badge-medium', text: level };
            return `<span class="badge ${info.class}">${info.text}</span>`;
        }

        function getStatusBadge(status) {
            const map = {
                'suspected': { class: 'badge-medium', text: '疑似' },
                'confirmed': { class: 'badge-high', text: '已确认' },
                'warning_sent': { class: 'badge-medium', text: '已发警告' },
                'warning_acknowledged': { class: 'badge-success', text: '已回执' },
                'litigation_prepared': { class: 'badge-high', text: '待起诉' },
                'litigation_in_progress': { class: 'badge-high', text: '诉讼中' },
                'settled': { class: 'badge-success', text: '已和解' },
                'won': { class: 'badge-success', text: '胜诉' },
                'lost': { class: 'badge-high', text: '败诉' },
                'closed': { class: 'badge-info', text: '已关闭' }
            };
            const info = map[status] || { class: 'badge-info', text: status };
            return `<span class="badge ${info.class}">${info.text}</span>`;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
